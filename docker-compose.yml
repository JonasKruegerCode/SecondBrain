services:

  frontend:
    image: ghcr.io/jonaskruegercode/secondbrain-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped

  backend:
    image: ghcr.io/jonaskruegercode/secondbrain-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "3000:3000"
    depends_on:
      - redis
      - neo4j
      - qdrant
    volumes:
      - vault_data:/vault
    restart: unless-stopped

  worker:
    image: ghcr.io/jonaskruegercode/secondbrain-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - neo4j
      - qdrant
    volumes:
      - vault_data:/vault
    command: celery -A second_brain.core.celery_app worker --beat --loglevel=info --concurrency=2
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  vault_data:
  redis_data:
  neo4j_data:
  qdrant_data:
