server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/* is NOT handled here — NPM routes it to the backend container
    # Browser requests go to brain.domain.com/api/* → backend:8000
}
